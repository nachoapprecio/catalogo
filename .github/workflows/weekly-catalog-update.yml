name: Weekly Catalog Update

on:
  schedule:
    - cron: "0 * * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  weekly-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run only at 10:00 America/Santiago
        shell: bash
        run: |
          HOUR_CL="$(TZ=America/Santiago date +%H)"
          if [[ "$HOUR_CL" != "10" ]]; then
            echo "Skipping run. Current America/Santiago hour: $HOUR_CL"
            exit 0
          fi

      - name: Configure git author
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push weekly updates
        shell: bash
        run: bash scripts/weekly_json_commit.sh
